---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: conntrack-ebpf-exporter
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: conntrack-ebpf-exporter
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: conntrack-ebpf-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: conntrack-ebpf-exporter
subjects:
  - kind: ServiceAccount
    name: conntrack-ebpf-exporter
    namespace: observability
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: conntrack-ebpf-exporter
  namespace: observability
  labels:
    app: conntrack-ebpf-exporter
spec:
  selector:
    matchLabels:
      app: conntrack-ebpf-exporter
  template:
    metadata:
      labels:
        app: conntrack-ebpf-exporter
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: conntrack-ebpf-exporter
      hostNetwork: true
      hostPID: true
      containers:
        - name: exporter
          image: ghcr.io/zufardhiyaulhaq/conntrack-ebpf-exporter:master
          imagePullPolicy: Always
          securityContext:
            privileged: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: METRICS_PORT
              value: "9990"
            - name: LOG_LEVEL
              value: "info"
          ports:
            - name: metrics
              containerPort: 9990
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9990
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9990
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      tolerations:
        - operator: Exists