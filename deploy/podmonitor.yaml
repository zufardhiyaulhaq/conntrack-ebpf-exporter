---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: conntrack-ebpf-exporter
  namespace: kube-system
  labels:
    app: conntrack-ebpf-exporter
spec:
  selector:
    matchLabels:
      app: conntrack-ebpf-exporter
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      honorLabels: true
